name: Run Russell Analysis

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests yfinance lxml

      - name: Extract Top 200 (iShares)
        run: python extract_ishares.py

      - name: Extract Bottom 200 (iShares)
        run: python extract_bottom_200.py

      - name: Build input CSV (for Yahoo Processing)
        run: python build_input_csv.py

      - name: Run Yahoo Finance Processing (Top 200)
        run: python russell3000_top200.py

      - name: Verify outputs
        run: |
          ls -lh
          test -f russell3000_yahoo.csv
          test -f russell3000_bottom200.csv

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: russell_analysis_data
          path: |
            russell3000_yahoo.csv
            russell3000_bottom200.csv
          if-no-files-found: error
