name: Run Russell Top 200

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests yfinance lxml

      - name: Extract iShares Data
        run: python extract_ishares.py

      - name: Build input CSV
        run: python build_input_csv.py

      - name: Run Yahoo Finance Processing
        run: python russell3000_top200.py

      - name: Verify output
        run: |
          ls -lh
          test -f russell3000_yahoo.csv

      - name: Upload CSV
        uses: actions/upload-artifact@v4
        with:
          name: russell3000_yahoo_csv
          path: russell3000_yahoo.csv
          if-no-files-found: error
